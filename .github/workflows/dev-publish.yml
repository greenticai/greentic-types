name: Dev Publish crates (types)

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Lint & Test
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo build --workspace --all-features
          cargo test --workspace --all-features -- --nocapture
      - name: Prevent duplicate shared structs
        run: ./scripts/deny_dupes.sh
      - name: Verify published schema IDs
        run: ./scripts/check_schema_ids.sh

  msrv:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    strategy:
      matrix:
        profile:
          - { name: default, args: "" }
          - { name: schema, args: "--features schema" }
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
      - uses: Swatinem/rust-cache@v2
      - name: Cargo check (${{ matrix.profile.name }})
        run: cargo check --workspace ${{ matrix.profile.args }}

  publish:
    name: Publish dev crates to CodeArtifact
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [build-test, msrv]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get CodeArtifact Token
        run: |
          token=$(aws codeartifact get-authorization-token \
            --domain ${{ secrets.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ secrets.CODEARTIFACT_DOMAIN_OWNER }} \
            --region ${{ secrets.AWS_REGION }} \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$token"
          echo "CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TOKEN=$token" >> $GITHUB_ENV

      - name: Configure CodeArtifact Registry (via template)
        run: |
          mkdir -p .cargo
          cp ci/cargo-config-dev.toml .cargo/config.toml

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: "6.x"
      - name: Determine dev version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4
        with:
          configFilePath: GitVersion.yml
      - name: Set dev version for workspace crates
        shell: bash
        run: |
          set -euo pipefail
          dev_version="${{ steps.gitversion.outputs.MajorMinorPatch }}-${{ steps.gitversion.outputs.PreReleaseTag }}"
          echo "Using dev version: ${dev_version}"
          
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"${dev_version}\"/" Cargo.toml
          # Update internal macro dependency version if it exists
          sed -i -E "/greentic-types-macros/s/version = \"[^\"]+\"/version = \"${dev_version}\", registry = \"corp-artifacts-greentic\"/" Cargo.toml
          
      - name: Publish to CodeArtifact
        run: |
          cargo publish -p greentic-types-macros --registry corp-artifacts-greentic --allow-dirty
          sleep 5
          cargo publish -p greentic-types --registry corp-artifacts-greentic --allow-dirty

      - name: Create Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.gitversion.outputs.FullSemVer }}"
          echo "Creating tag ${tag}"
          
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${tag}"
            git push origin "${tag}"
          fi
