name: Dev Publish crates (types)

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Lint & Test
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo build --workspace --all-features
          cargo test --workspace --all-features -- --nocapture
      - name: Prevent duplicate shared structs
        run: ./scripts/deny_dupes.sh
      - name: Verify published schema IDs
        run: ./scripts/check_schema_ids.sh

  msrv:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        profile:
          - { name: default, args: "" }
          - { name: schema, args: "--features schema" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
      - uses: Swatinem/rust-cache@v2
      - name: Cargo check (${{ matrix.profile.name }})
        run: cargo check --workspace ${{ matrix.profile.args }}

  publish:
    name: Publish dev crate to Cloudsmith
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [build-test, msrv]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY || secrets.GH_PAT }}
      CARGO_REGISTRIES_CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_API_KEY || secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          override: true
      - uses: Swatinem/rust-cache@v2

      - name: Configure Cloudsmith Registry (via template)
        run: |
          mkdir -p .cargo
          cp ci/cargo-config-dev.toml .cargo/config.toml

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v1
        with:
          versionSpec: "5.x"
      - name: Determine dev version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml
      - name: Set dev version for workspace crates
        shell: bash
        run: |
          set -euo pipefail
          dev_version="${{ steps.gitversion.outputs.MajorMinorPatch }}-${{ steps.gitversion.outputs.PreReleaseTag }}"
          echo "Using dev version: ${dev_version}"
          
          # 1. Update workspace version in root Cargo.toml
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"${dev_version}\"/" Cargo.toml
          
          # 2. Update version and registry of greentic-types-macros dependency in root Cargo.toml safely
          # We search for the line and only replace the version string, adding registry="cloudsmith"
          sed -i -E "/greentic-types-macros/s/version = \"[^\"]+\"/version = \"${dev_version}\", registry = \"cloudsmith\"/" Cargo.toml
          
      - name: Publish to Cloudsmith
        run: |
          # Publish order matters: dependencies first
          # 1. greentic-types-macros
          cargo publish -p greentic-types-macros --registry cloudsmith --allow-dirty
          
          # Wait a bit for the index to update (optional but safer)
          sleep 5
          
          # 2. greentic-types
          cargo publish -p greentic-types --registry cloudsmith --allow-dirty

      - name: Create Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.gitversion.outputs.FullSemVer }}"
          echo "Creating tag ${tag}"
          
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${tag}"
            git push origin "${tag}"
          fi
